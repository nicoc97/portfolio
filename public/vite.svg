<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="retro-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#f7931e"/>
      <stop offset="100%" stop-color="#ffd23f"/>
    </linearGradient>
  </defs>
  
  <!-- Background square with rounded corners -->
  <rect x="2" y="2" width="28" height="28" rx="4" ry="4" fill="#1a1a1a"/>
  
  <!-- Pixel-style N -->
  <g fill="url(#retro-gradient)">
    <!-- N left vertical -->
    <rect x="8" y="10" width="2" height="12"/>
    <!-- N diagonal -->
    <rect x="10" y="10" width="2" height="2"/>
    <rect x="12" y="12" width="2" height="2"/>
    <rect x="14" y="14" width="2" height="2"/>
    <rect x="16" y="16" width="2" height="2"/>
    <!-- N right vertical -->
    <rect x="18" y="10" width="2" height="12"/>
  </g>
  
  <!-- Pixel-style C -->
  <g fill="url(#retro-gradient)">
    <!-- C top horizontal -->
    <rect x="22" y="10" width="4" height="2"/>
    <!-- C left vertical -->
    <rect x="22" y="12" width="2" height="8"/>
    <!-- C bottom horizontal -->
    <rect x="22" y="20" width="4" height="2"/>
  </g>
</svg>