<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nico Cruickshank - Portfolio</title>
    
    <!-- SEO and AI Bot Meta Tags -->
    <meta name="description" content="Nico Cruickshank - Full Stack Web Developer specializing in React, TypeScript, Node.js, and modern web technologies. View my projects and get in touch." />
    <meta name="keywords" content="web developer, full stack developer, React, TypeScript, JavaScript, Node.js, portfolio, Nico Cruickshank" />
    <meta name="author" content="Nico Cruickshank" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph for Social Media and AI -->
    <meta property="og:title" content="Nico Cruickshank - Web Developer Portfolio" />
    <meta property="og:description" content="Full Stack Web Developer specializing in React, TypeScript, and modern web technologies" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-domain.com" />
    <meta property="og:site_name" content="Nico Cruickshank Portfolio" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nico Cruickshank - Web Developer Portfolio" />
    <meta name="twitter:description" content="Full Stack Web Developer specializing in React, TypeScript, and modern web technologies" />
    
    <!-- JSON-LD Structured Data for AI Parsing -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Nico Cruickshank",
      "jobTitle": "Full Stack Web Developer",
      "description": "Experienced web developer specializing in React, TypeScript, Node.js, and modern web technologies",
      "url": "https://your-domain.com",
      "sameAs": [
        "https://github.com/your-github",
        "https://linkedin.com/in/your-linkedin"
      ],
      "knowsAbout": [
        "React",
        "TypeScript",
        "JavaScript",
        "Node.js",
        "HTML5",
        "CSS3",
        "Tailwind CSS",
        "Git",
        "Web Development",
        "Frontend Development",
        "Backend Development"
      ]
    }
    </script>
    
    <!-- 70s retro and pixel fonts -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Fredoka+One&family=Share+Tech+Mono&family=JetBrains+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
